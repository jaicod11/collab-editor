# infra/redis.conf
# ─────────────────────────────────────────────────────────────────────────────
# Redis configuration tuned for the CollabDocs op-log workload.
# Key characteristics:
#   - High write throughput (every keystroke = one RPUSH to op log)
#   - Many short-lived keys (doc caches with 1h TTL)
#   - Pub/Sub for cross-node op broadcasting
#   - Two logical DBs: 0 = cache/pub-sub, 1 = sessions
#
# Mount this file in docker-compose.yml:
#   command: redis-server /etc/redis/redis.conf
#   volumes:
#     - ./redis.conf:/etc/redis/redis.conf
#     - redis-data:/data
# ─────────────────────────────────────────────────────────────────────────────

# ── Network ──────────────────────────────────────────────────────────────────
bind 127.0.0.1 ::1          # localhost only — Nginx sits in front
port 6379
protected-mode yes

# ── Authentication (set a password in production) ────────────────────────────
# requirepass your_strong_redis_password_here
# In docker-compose, set via: REDIS_URL=redis://:password@redis:6379

# ── Memory management ────────────────────────────────────────────────────────
# Target: 256MB for a small deployment (increase for large doc sets)
maxmemory 256mb

# allkeys-lru: when full, evict the least-recently-used keys first.
# Good for our workload — hot docs stay in cache, cold ones get evicted.
# DO NOT use volatile-lru: our TTL keys (doc caches) would be evicted
# before non-TTL keys (op logs), which is the opposite of what we want.
maxmemory-policy allkeys-lru

# ── Persistence ──────────────────────────────────────────────────────────────
# RDB snapshot: saves a point-in-time backup.
# For CollabDocs: Redis is a cache — the source of truth is MongoDB.
# These snapshots are a safety net, not the primary durability mechanism.
save 900 1      # save after 900s if at least 1 key changed
save 300 10     # save after 300s if at least 10 keys changed
save 60  1000   # save after 60s  if at least 1000 keys changed
dbfilename      dump.rdb
dir             /data

# AOF (Append-Only File): more durable, higher write cost.
# Disabled by default — enable if you want Redis to survive a crash
# with full op-log integrity (at ~2x write overhead).
appendonly      no
# appendonly    yes
# appendfilename "appendonly.aof"
# appendfsync   everysec      # fsync once per second (balanced)

# ── Pub/Sub tuning ───────────────────────────────────────────────────────────
# CollabDocs uses pub/sub for cross-node op broadcasting.
# No special config needed for pub/sub itself, but these help:

# Don't close idle pub/sub connections
tcp-keepalive 60

# Limits on pub/sub client output buffer
# If a subscriber is too slow reading, Redis will disconnect it.
# Format: hard_limit soft_limit soft_seconds
client-output-buffer-limit pubsub 32mb 8mb 60

# ── Performance ──────────────────────────────────────────────────────────────
tcp-backlog     511
hz              20          # internal timer frequency (ops/sec checks)
lazyfree-lazy-eviction yes  # evict keys in background thread
lazyfree-lazy-expire   yes  # expire keys in background thread

# ── List tuning (op log is stored as a Redis LIST) ───────────────────────────
# When a list has <= 128 entries and each entry <= 64 bytes,
# Redis uses a compact ziplist encoding (much faster, less memory).
# Our op entries are typically 40-80 bytes — tune accordingly.
list-max-ziplist-size -2    # -2 = 8kb per list node (good default)
list-compress-depth  1      # compress middle nodes, keep head/tail fast

# ── Key expiry ───────────────────────────────────────────────────────────────
# Active expiry: Redis checks hz * 10 keys per second for expiration.
# With hz=20, that's 200 keys/sec. Fine for our TTL key volume.
# No additional config needed.

# ── Slow log (debug) ─────────────────────────────────────────────────────────
# Log commands that take longer than 10ms (10000 microseconds).
# Check with: redis-cli SLOWLOG GET 10
slowlog-log-slower-than 10000
slowlog-max-len         128

# ── Keyspace notifications (optional) ────────────────────────────────────────
# Enable if you want the server to react to key expiry events.
# For example: clean up in-memory room state when a doc cache TTL expires.
# notify-keyspace-events "Ex"   # E = keyevent events, x = expired events
notify-keyspace-events ""       # disabled by default (has CPU cost)

# ── Databases ────────────────────────────────────────────────────────────────
databases 2     # DB 0: cache + pub/sub,  DB 1: sessions (optional separation)