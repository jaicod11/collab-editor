# infra/docker-compose.yml
# ─────────────────────────────────────────────────────────────────────────────
# Local development infrastructure.
# Start with: docker compose up -d
# Stop with:  docker compose down
# ─────────────────────────────────────────────────────────────────────────────

version: "3.9"

services:
  # ── MongoDB ──────────────────────────────────────────────────────────────
  mongo:
    image: mongo:7.0
    container_name: collab-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: collab-editor
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis ────────────────────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    container_name: collab-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis Commander (optional UI) ─────────────────────────────────────────
  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: collab-redis-ui
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      - redis
    profiles:
      - debug   # only starts with: docker compose --profile debug up

volumes:
  mongo-data:
  redis-data:
