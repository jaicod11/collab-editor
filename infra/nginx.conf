# infra/nginx.conf
# ─────────────────────────────────────────────────────────────────────────────
# Production Nginx config for CollabDocs.
# Handles:
#   - WebSocket upgrade (Socket.io)
#   - Upstream load balancing across multiple Node.js instances
#   - Static file serving for the built React app
#   - SSL termination (add your cert paths)
#   - Gzip compression
#
# Usage:
#   docker run -v $(pwd)/nginx.conf:/etc/nginx/nginx.conf nginx:alpine
#   OR place in /etc/nginx/sites-available/collab-editor
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 4096;        # handles concurrent WebSocket connections
    use epoll;                      # Linux: most efficient event model
    multi_accept on;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Logging ─────────────────────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;

    # ── Performance ──────────────────────────────────────────────────────────
    sendfile           on;
    tcp_nopush         on;
    tcp_nodelay        on;               # critical for low-latency WebSockets
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # ── Gzip ─────────────────────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css text/xml application/json
                    application/javascript application/xml+rss
                    application/atom+xml image/svg+xml;

    # ── Rate limiting ────────────────────────────────────────────────────────
    limit_req_zone  $binary_remote_addr zone=api:10m    rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=ws_conn:10m;

    # ── Upstream: multiple Node.js instances (horizontal scaling) ────────────
    # Add more servers here when scaling out.
    # ip_hash ensures the same client hits the same node (sticky sessions).
    # With @socket.io/redis-adapter installed, remove ip_hash and use
    # round-robin instead — all nodes share state via Redis.
    upstream node_servers {
        ip_hash;                        # sticky sessions for Socket.io
        server 127.0.0.1:4000;
        server 127.0.0.1:4001;          # second instance (npm start PORT=4001)
        server 127.0.0.1:4002;          # third  instance
        keepalive 32;                   # persistent upstream connections
    }

    # ── HTTP → HTTPS redirect ────────────────────────────────────────────────
    server {
        listen      80;
        server_name yourdomain.com www.yourdomain.com;
        return 301  https://$host$request_uri;
    }

    # ── Main server block ────────────────────────────────────────────────────
    server {
        listen      443 ssl http2;
        server_name yourdomain.com www.yourdomain.com;

        # ── SSL (replace with your cert paths) ──────────────────────────────
        ssl_certificate     /etc/ssl/certs/yourdomain.crt;
        ssl_certificate_key /etc/ssl/private/yourdomain.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # ── Security headers ─────────────────────────────────────────────────
        add_header X-Frame-Options         SAMEORIGIN;
        add_header X-Content-Type-Options  nosniff;
        add_header X-XSS-Protection        "1; mode=block";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains";

        # ── React SPA static files ───────────────────────────────────────────
        root  /var/www/collab-editor/dist;   # vite build output
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;   # SPA fallback

            # Cache JS/CSS chunks (Vite adds content hash to filenames)
            location ~* \.(js|css|woff2?|ttf|svg|png|ico)$ {
                expires     1y;
                add_header  Cache-Control "public, immutable";
            }
        }

        # ── REST API proxy ───────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass         http://node_servers;
            proxy_http_version 1.1;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 30s;
        }

        # ── Socket.io WebSocket proxy ────────────────────────────────────────
        # The key block: upgrades HTTP → WS and disables buffering.
        location /socket.io/ {
            limit_conn ws_conn 10;          # max 10 WS connections per IP

            proxy_pass         http://node_servers;
            proxy_http_version 1.1;

            # WebSocket upgrade headers (REQUIRED)
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";

            proxy_set_header   Host             $host;
            proxy_set_header   X-Real-IP        $remote_addr;
            proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;

            # Long timeout — WebSocket connections are long-lived
            proxy_read_timeout  3600s;
            proxy_send_timeout  3600s;

            # Disable buffering for real-time sub-50ms delivery
            proxy_buffering     off;
            proxy_cache         off;
        }

        # ── Health check endpoint ────────────────────────────────────────────
        location /health {
            proxy_pass http://node_servers;
            access_log off;
        }
    }
}